<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Kidstube player</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #player, #player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script>
      // Kidstube YouTube relay. The Capacitor app embeds this page (served over a
      // real HTTPS origin) so YouTube gets a verifiable Referer (fixes WKWebView
      // error 153). The app sends play/pause via postMessage; this page relays
      // ready/state/error back to the app.
      (function () {
        var params = new URLSearchParams(location.search);
        var videoId = params.get("v") || "";
        var player = null, ready = false, desired = null;
        function apply() {
          if (!ready || !player) return;
          if (desired === "play") player.playVideo();
          else if (desired === "pause") player.pauseVideo();
        }
        function post(msg) { msg.source = "kidstube-yt"; if (window.parent) window.parent.postMessage(msg, "*"); }
        window.addEventListener("message", function (e) {
          var d = e.data;
          if (!d || d.source !== "kidstube-app") return;
          if (d.type === "play") { desired = "play"; apply(); }
          else if (d.type === "pause") { desired = "pause"; apply(); }
        });
        var tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        window.onYouTubeIframeAPIReady = function () {
          player = new YT.Player("player", {
            videoId: videoId,
            playerVars: { playsinline: 1, rel: 0, modestbranding: 1, origin: location.origin },
            events: {
              onReady: function () { ready = true; post({ type: "ready" }); apply(); },
              onStateChange: function (ev) { post({ type: "state", state: ev.data }); },
              onError: function (ev) { post({ type: "error", code: ev.data }); },
            },
          });
        };
      })();
    </script>
  </body>
</html>
